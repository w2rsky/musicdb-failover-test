<<'SVG'
<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="330">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="45%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 46px;
        font-weight: 800;
        fill: #FFFFFF;
      }

      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 500;
        fill: #CBD5E1;
      }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #E0F2FE;
      }

      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        fill: #BAE6FD;
      }

      .pulse {
        animation: pulse 2.2s ease-in-out infinite;
      }

      .float {
        animation: float 4s ease-in-out infinite;
      }

      .flow {
        stroke-dasharray: 12 10;
        animation: dash 2s linear infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.45; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      @keyframes dash {
        to { stroke-dashoffset: -44; }
      }
    </style>
  </defs>

  <rect width="1200" height="330" rx="28" fill="url(#bg)"/>

  <circle class="pulse" cx="165" cy="80" r="120" fill="url(#glow1)"/>
  <circle class="pulse" cx="1030" cy="245" r="140" fill="url(#glow2)"/>

  <g filter="url(#shadow)">
    <text x="70" y="95" class="title">MusicDB Failover Test</text>
    <text x="70" y="132" class="subtitle">PostgreSQL fault-tolerant cluster for a music streaming database</text>
    <text x="70" y="165" class="subtitle">Отказоустойчивый кластер PostgreSQL для БД музыкального стриминга</text>
  </g>

  <g class="float" filter="url(#shadow)">
    <rect x="100" y="220" width="190" height="70" rx="16" fill="#0369A1" opacity="0.95"/>
    <text x="137" y="250" class="label">MASTER</text>
    <text x="128" y="274" class="small">postgres-master</text>
  </g>

  <g class="float" filter="url(#shadow)" style="animation-delay: .4s">
    <rect x="505" y="220" width="190" height="70" rx="16" fill="#4C1D95" opacity="0.95"/>
    <text x="548" y="250" class="label">STANDBY</text>
    <text x="542" y="274" class="small">postgres-standby</text>
  </g>

  <g class="float" filter="url(#shadow)" style="animation-delay: .8s">
    <rect x="910" y="220" width="190" height="70" rx="16" fill="#065F46" opacity="0.95"/>
    <text x="956" y="250" class="label">ARBITER</text>
    <text x="966" y="274" class="small">witness node</text>
  </g>

  <path class="flow" d="M295 255 C365 205, 430 205, 500 255" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path class="flow" d="M705 255 C775 205, 835 205, 905 255" stroke="#A78BFA" stroke-width="5" stroke-linecap="round" fill="none"/>

  <text x="360" y="214" class="small">WAL streaming replication</text>
  <text x="760" y="214" class="small">safe promotion decision</text>
</svg>
SVG
